services:
  postgres:
    image: postgres:17-alpine
    container_name: coloc-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: coloc
      POSTGRES_PASSWORD: coloc
      POSTGRES_DB: coloc
    volumes:
      - coloc-pgdata:/var/lib/postgresql/data

volumes:
  coloc-pgdata:
